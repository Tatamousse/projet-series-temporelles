<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/bootstrap_V522.min.css') }}">
  <title>Détection de Rupture — Skew Normal — TER</title>
</head>

<body style="margin: 0; padding: 0; min-height: 100vh;
             background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                         url('{{ url_for('static', filename='images/trains.jpg') }}') center/cover no-repeat fixed;">

  <div style="max-width: 800px; margin: 80px auto; padding: 40px; text-align: center;">

    <h1 style="color:white; font-family: Helvetica, sans-serif; text-shadow: 2px 2px 8px black;">
      Régularité mensuelle TER
    </h1>

    <h3 style="color: #ddd; margin-top: 5px;">
      Détection de rupture — Loi Skew Normal
    </h3>

    <br/>

    <h4>
      <a href="https://ressources.data.sncf.com/explore/dataset/regularite-mensuelle-ter/information/"
         target="_blank" style="text-decoration:none; color:#87CEEB;">
        📊 Source de données SNCF
      </a>
    </h4>

    <br/><br/>

    <form method="POST" action="{{ url_for('Resultats') }}"
          style="background: rgba(255,255,255,0.15); padding: 30px; border-radius: 15px; backdrop-filter: blur(5px);">

      <label for="Choix_region" style="color: white; font-size: 16pt; display: block; margin-bottom: 15px;">
        Choisir une Région :
      </label>

      <select name="Choix_region" id="Choix_region"
              style="font-size: 14pt; padding: 8px 20px; border-radius: 8px; border: none; margin-bottom: 15px;">
        <option value="{}" selected> — Sélectionner — </option>
        {% for k in Regions %}
          <option value="{{k}}">{{k}}</option>
        {% endfor %}
      </select>

      <br/><br/>

      <label style="color: white; font-size: 16pt; display: block; margin-bottom: 15px;">
        Variable à étudier :
      </label>

      <div style="display: inline-flex; gap: 20px;">
        <label style="color: white; font-size: 13pt; cursor: pointer;">
          <input type="radio" name="Choix_variable" value="4" checked
                 style="margin-right: 6px; transform: scale(1.3); vertical-align: middle;">
          Trains annulés
        </label>
        <label style="color: white; font-size: 13pt; cursor: pointer;">
          <input type="radio" name="Choix_variable" value="5"
                 style="margin-right: 6px; transform: scale(1.3); vertical-align: middle;">
          Trains en retard
        </label>
      </div>

      <br/>

      <button type="submit" id="btn-analyser" onclick="showSpinner()"
              style="font-size: 14pt; padding: 10px 40px; border-radius: 8px; border: none;
                     background: #2980b9; color: white; cursor: pointer; margin-top: 10px;">
        <span id="btn-text">Analyser</span>
        <span id="btn-spinner" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 50 50" style="vertical-align: middle; margin-right: 8px;">
            <circle cx="25" cy="25" r="20" fill="none" stroke="white" stroke-width="4"
                    stroke-dasharray="90 60" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate"
                                from="0 25 25" to="360 25 25" dur="0.8s" repeatCount="indefinite"/>
            </circle>
          </svg>
          Calcul en cours...
        </span>
      </button>

      <script>
      function showSpinner() {
        document.getElementById('btn-text').style.display = 'none';
        document.getElementById('btn-spinner').style.display = 'inline';
        document.getElementById('btn-analyser').style.opacity = '0.7';
        document.getElementById('btn-analyser').style.cursor = 'wait';
        setTimeout(function() {
          document.getElementById('btn-analyser').disabled = true;
        }, 100);
      }
      </script>
    </form>
  </div>

  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
